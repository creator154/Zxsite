<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RARE STUDY</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#071229;
color:white;
padding:20px;
}

.logo{
text-align:center;
font-size:40px;
font-weight:bold;
margin:20px 0;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-size:18px;
margin-bottom:20px;
}

.card{
background:#16233f;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.card h2{
margin-bottom:10px;
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:12px;
}

.batch{
display:none;
background:#16233f;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.lecture{
background:#223456;
padding:15px;
margin:10px 0;
border-radius:10px;
}

.lecture a{
color:white;
text-decoration:none;
}
</style>
</head>
<body>

<div class="logo">📚 RARE STUDY</div>

<input type="text" class="search" placeholder="Search Batch..." id="search" onkeyup="searchBatch()">

<div class="card">
<h2>Yakeen NEET Hindi 2027</h2>
<p>Physics • Chemistry • Biology</p>
<a href="#" class="btn" onclick="openBatch('yakeen')">Open Batch</a>
</div>

<div class="card">
<h2>Lakshya NEET 2027</h2>
<p>Physics • Chemistry • Biology</p>
<a href="#" class="btn" onclick="openBatch('lakshya')">Open Batch</a>
</div>

<div id="yakeen" class="batch">
<h2>Yakeen NEET Hindi 2027</h2>

<div class="lecture">
<a href="#">📹 Biology Lecture 01</a>
</div>

<div class="lecture">
<a href="#">📹 Physics Lecture 01</a>
</div>

<div class="lecture">
<a href="#">📹 Chemistry Lecture 01</a>
</div>

</div>

<div id="lakshya" class="batch">
<h2>Lakshya NEET 2027</h2>

<div class="lecture">
<a href="#">📹 Biology Lecture</a>
</div>

<div class="lecture">
<a href="#">📹 Physics Lecture</a>
</div>

</div>

<script>

function openBatch(id){

document.querySelectorAll('.batch').forEach(x=>{
x.style.display='none';
});

document.getElementById(id).style.display='block';

window.scrollTo({
top:document.getElementById(id).offsetTop-20,
behavior:'smooth'
});
}

function searchBatch(){

let input=document.getElementById("search").value.toLowerCase();

let cards=document.getElementsByClassName("card");

for(let i=0;i<cards.length;i++){

let text=cards[i].innerText.toLowerCase();

if(text.includes(input)){
cards[i].style.display="";
}else{
cards[i].style.display="none";
}
}
}
</script>

</body>
</html>
