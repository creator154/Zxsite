<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rare Study</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
margin-bottom:20px;
}

.search{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:20px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-bottom:10px;
}

.btn{
display:inline-block;
padding:10px 15px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;
margin-top:10px;
}

.telegram{
display:block;
text-align:center;
margin-top:25px;
padding:12px;
background:#0088cc;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<div class="logo">📚 RARE STUDY</div>

<input
type="text"
class="search"
id="search"
placeholder="Search Batch..."
onkeyup="searchBatch()">

<div class="grid" id="batches">

<div class="card">
<h3>Yakeen NEET Hindi 2027</h3>
<p>Physics • Chemistry • Biology</p>
<a href="#" class="btn">Open Batch</a>
</div>

<div class="card">
<h3>Yakeen NEET English 2027</h3>
<p>Physics • Chemistry • Biology</p>
<a href="#" class="btn">Open Batch</a>
</div>

<div class="card">
<h3>Lakshya NEET 2027</h3>
<p>Physics • Chemistry • Biology</p>
<a href="#" class="btn">Open Batch</a>
</div>

<div class="card">
<h3>Arjuna NEET 2028</h3>
<p>Physics • Chemistry • Biology</p>
<a href="#" class="btn">Open Batch</a>
</div>

</div>

<a href="https://t.me/yourchannel" class="telegram">
Join Telegram
</a>

<script>
function searchBatch() {
let input = document.getElementById("search").value.toLowerCase();
let cards = document.getElementsByClassName("card");

for(let i=0;i<cards.length;i++){
let text = cards[i].innerText.toLowerCase();

if(text.includes(input)){
cards[i].style.display="";
}else{
cards[i].style.display="none";
}
}
}
</script>

</body>
  </html>
